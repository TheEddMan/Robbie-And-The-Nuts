            background-position: center top;
            background-repeat: no-repeat;
            z-index: 0;

        /* Dark overlay - only at the bottom for the buttons */
        .bg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                to bottom,
                rgba(0, 0, 0, 0) 0%,
                rgba(0, 0, 0, 0) 60%,
                rgba(0, 0, 0, 0.85) 100%
            );
            z-index: 1;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 40px 24px;
            position: relative;
            z-index: 2;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding-bottom: 60px;
        }

        /* Hero section */
        .hero {
            text-align: center;
        }

        /* Band name */
        .band-name {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(3rem, 10vw, 5.5rem);
            margin-top: 48px;
            letter-spacing: 4px;
            color: #fff;
            line-height: 1;
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        }

        /* Tagline */
        .tagline {
            font-size: 1.1rem;
            margin-top: 16px;
            color: #a0a0a0;
            font-weight: 400;
            letter-spacing: 0.5px;
        }

        /* Divider */
        .divider {
            width: 60px;
            height: 3px;
            background: linear-gradient(90deg, #d4a574, #c9956c);
            margin: 48px auto;
            border-radius: 2px;
        }

        /* Social links section */
        .social-section {
            text-align: center;
        }

        .social-links {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 16px;
            margin-top: 32px;
        }

        .social-link {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 14px 28px;
            text-decoration: none;
            font-weight: 500;
            font-size: 0.95rem;
            border-radius: 8px;
            transition: all 0.2s ease;
            background: #1a1a1a;
            color: #fff;
            border: 1px solid #2a2a2a;
        }

        .social-link:hover {
            background: #242424;
            border-color: #3a3a3a;
            transform: translateY(-2px);
        }

        .social-link svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
            opacity: 0.8;
        }

        .social-link:hover svg {
            opacity: 1;
        }

        /* CTA button for bookings */
        .social-link.cta {
            background: linear-gradient(135deg, #c9956c, #b8845c);
            border: none;
            color: #fff;
        }

        .social-link.cta:hover {
            background: linear-gradient(135deg, #d4a574, #c9956c);
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 40px 24px 0;
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.85rem;
        }

        footer a {
            color: rgba(255, 255, 255, 0.6);
            text-decoration: none;
        }

        footer a:hover {
            color: rgba(255, 255, 255, 0.8);
        }

        /* Mobile */
        @media (max-width: 600px) {
            .container {
                padding: 24px 16px;
            }

            .social-links {
                flex-direction: column;
                align-items: stretch;
            }

            .social-link {
                justify-content: center;
            }

            .band-name {
                letter-spacing: 2px;
            }
        }
    </style>
</head>
